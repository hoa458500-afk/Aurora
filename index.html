<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ở đây dành cho bà</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ==========================
         INTRO
    =========================== -->

    <section id="intro-screen">

        <div class="intro-content">

            <div class="moon">🌙</div>

            <h1>Ở đây dành cho bà</h1>

            <p>Một nơi để nghỉ một chút.</p>

            <button id="start-btn">

                BẮT ĐẦU

            </button>

        </div>

    </section>

    <!-- ==========================
         APP
    =========================== -->

    <main id="app">

        <section id="scene-container">

            <img
                id="scene-image"
                src="assets/images/scene1.png"
                alt="Scene">

            <div id="overlay"></div>

            <div id="text-container">

                <p id="message"></p>

            </div>

        </section>

    </main>

    <!-- ==========================
         ENDING
    =========================== -->

    <section id="ending-screen">

        <div class="ending-content">

            <h2>

                Ở đây dành cho bà mỗi khi mệt. 🤍

            </h2>

        </div>

    </section>

    <!-- ==========================
         AUDIO
    =========================== -->

    <audio
        id="bgm"
        src="assets/audio/piano.mp3"
        preload="auto">
    </audio>

    <!-- ==========================
         SCRIPT
    =========================== -->

    <script src="script.js"></script>

</body>

</html>
